[pytest]
addopts =
        --cov
        --cov-report term
        --cov-report html
        --no-cov-on-fail
        --strict-markers
        -Werror
        -W ignore:"The --rsyncdir command line argument and rsyncdirs config variable are deprecated.":DeprecationWarning

asyncio_default_fixture_loop_scope = function

markers =
    only
    using_pytester

testpaths =
          tests
          examples/app_examples/app_tests
